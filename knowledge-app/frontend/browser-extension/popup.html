<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 350px;
      padding: 16px;
      font-family: system-ui;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .btn:hover {
      background: #2563eb;
    }
    .select {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .status {
      padding: 8px;
      border-radius: 6px;
      margin-top: 12px;
      text-align: center;
      font-size: 13px;
    }
    .success {
      background: #d1fae5;
      color: #065f46;
    }
    .error {
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <h2>Save to Knowledge Base</h2>
  
  <select id="type" class="select">
    <option value="article">Article</option>
    <option value="video">Video</option>
    <option value="pdf">PDF</option>
    <option value="tweet">Tweet</option>
    <option value="link">Link</option>
  </select>

  <button id="save" class="btn">💾 Save Page</button>
  <button id="saveSelection" class="btn">✂️ Save Selection</button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
